name: CI/CD

on:
  push:
    branches: [develop, main]
    tags: ['v*']
  pull_request:
    branches: [develop, main]

env:
  GOTOOLCHAIN: auto
  GOPRIVATE: github.com/Bastien-Antigravity/*

jobs:
  go-ci:
    name: Go (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum

      - name: Verify formatting
        run: cd go && if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then echo "Unformatted files found"; gofmt -d .; exit 1; fi

      - name: Install dependencies
        run: cd go && go mod download

      - name: Build
        run: cd go && go build ./...

      - name: Test
        run: cd go && go test -v -race ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: go

  python-ci:
    name: Python (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: cd python && pip install .[test]
          
      - name: Run Linting (Ruff)
        run: cd python && ruff check .
          
      - name: Run Tests (Pytest)
        run: cd python && pytest

  rust-ci:
    name: Rust (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
          components: clippy, rustfmt
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Run Cargo Test
        run: cd rust && cargo test --verbose
          
      - name: Run Cargo Clippy
        run: cd rust && cargo clippy -- -D warnings

  integration-ci:
    name: Cross-Language Integration
    needs: [go-ci, python-ci, rust-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          
      - name: Install Python dependencies
        run: cd python && pip install .
        
      - name: Run Integration Tests
        run: |
          chmod +x integration/run_tests.sh
          ./integration/run_tests.sh